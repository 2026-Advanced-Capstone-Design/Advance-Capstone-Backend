version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: newslens-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: newslens
      MYSQL_USER: newslens
      MYSQL_PASSWORD: newslens1234
      TZ: Asia/Seoul
    volumes:
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - newslens-network

  backend:
    image: jaewon0009/newslens-backend:latest
    container_name: newslens-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/newslens?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      SPRING_DATASOURCE_USERNAME: newslens
      SPRING_DATASOURCE_PASSWORD: newslens1234
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - newslens-network

volumes:
  mysql-data:

networks:
  newslens-network:
    driver: bridge
