spring:
  application:
    name: factcheck

  datasource:
    url: jdbc:mysql://localhost:3306/factcheck?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

youtube:
  api:
    key: ${YOUTUBE_API_KEY}

ai:
  youtube:
    analysis-url: ${YOUTUBE_AI_ANALYSIS_URL:https://4f16-182-224-124-102.ngrok-free.app/analyze/youtube}
