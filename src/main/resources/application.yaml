spring:
  application:
    name: factcheck

  datasource:
    url: jdbc:mysql://localhost:3306/factcheck?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

# Swagger UI
springdoc:
  swagger-ui:
    path: /swagger-ui/index.html

# OCR 설정
ocr:
  tessdata-path: /opt/homebrew/share/tessdata
  language: kor+eng

# Clova OCR fallback 설정
clova:
  ocr:
    api-url: https://XXXX.apigw.ntruss.com/custom/v1/XXXX/XXXX/general
    secret-key: your_clova_secret_key

youtube:
  api:
    key: ${YOUTUBE_API_KEY:}

ai:
  server:
    url: http://localhost:5000
  youtube:
    analysis-url: ${YOUTUBE_AI_ANALYSIS_URL:http://localhost:8000/analyze/youtube}
