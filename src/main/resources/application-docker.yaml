spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 5000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  tomcat:
    threads:
      max: 200
      min-spare: 20
    accept-count: 100

ai:
  server:
    url: ${AI_ENGINE_URL:http://ai-engine:5000}
  youtube:
    analysis-url: ${YOUTUBE_AI_ANALYSIS_URL:http://youtube-ai:8000/analyze/youtube}

ocr:
  tessdata-path: /usr/share/tesseract-ocr/4.00/tessdata
  language: kor+eng

clova:
  ocr:
    api-url: ${CLOVA_OCR_API_URL:}
    secret-key: ${CLOVA_OCR_SECRET_KEY:}

youtube:
  api:
    key: ${YOUTUBE_API_KEY:}

naver:
  api:
    client-id: ${NAVER_CLIENT_ID:}
    client-secret: ${NAVER_CLIENT_SECRET:}
